# Render Blueprint — Node.js/Express API (NOT FastAPI)
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: inventory-management-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_URI_DIRECT
        sync: false
      - key: FRONTEND_URL
        sync: false
